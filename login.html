{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-4 text-center">Login</h2>
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          required
        />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          minlength="6"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
      <p class="mt-3 small text-center text-muted">
        New here?
        <a href="{{ url_for('register') }}">Create an account</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
